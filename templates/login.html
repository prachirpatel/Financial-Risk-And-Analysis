<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background: #f4f6f9;background-image: url('image.jpg'); }
        .auth-card { width: 380px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card auth-card p-4 shadow">

        <h4 class="text-center mb-3">Login</h4>

        <!-- 🔹 FORM -->
        <form id="loginForm">
            <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-success w-100">Login</button>
        </form>

        <!-- 🔹 Links -->
        <div class="text-center mt-3">
            <a href="/forgot-password" class="d-block mb-2">Forgot Password?</a>
            <span>Don’t have an account? </span>
            <a href="/register">Register</a>
        </div>

    </div>
</div>

<!-- 🔥 JAVASCRIPT -->
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    });

    const data = await res.json();

    if (res.ok) {
        window.location.href = data.redirect;  // go to home
    } else {
        alert("Username and Password is invalid");
    }
});
</script>

</body>
</html>
