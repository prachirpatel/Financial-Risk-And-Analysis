<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .auth-card { width: 380px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card auth-card p-4 shadow">
        <h4 class="text-center mb-3">Create Account</h4>

        <form id="registerForm">
            <input type="text" id="name" class="form-control mb-2" placeholder="Name" required>
            <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
            <input type="password" id="password" class="form-control mb-2" placeholder="Password" required>

            <!-- ✅ Confirm Password -->
            <input type="password" id="confirmPassword" class="form-control mb-2" placeholder="Confirm Password" required>

            <input type="text" id="phone" class="form-control mb-3" placeholder="Phone" required>

            <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>

        <p class="text-center mt-3">
            Already have account? <a href="/login">Login</a>
        </p>
    </div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const phone = document.getElementById("phone").value;

    // ✅ Check password match
    if (password !== confirmPassword) {
        alert("Passwords do not match");
        return; // stop API call
    }

    const res = await fetch("/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            email: email,
            password: password,
            phone: phone
        })
    });

    const data = await res.json();

    if (res.ok) {
        alert("Registration successful");
        window.location.href = data.redirect;
    } else {
        alert(data.message);
    }
});
</script>

</body>
</html>
