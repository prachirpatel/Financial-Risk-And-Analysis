<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background: #343a40;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            padding: 12px;
            display: block;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #495057;
        }

        .submenu {
            padding-left: 20px;
            display: none;
        }

        /* Main content */
        .content {
            margin-left: 260px;
            padding: 20px;
        }
        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }
        #chatBtn:hover {
            transform: scale(1.1);
            box-shadow:0 6px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>

<!-- 🔹 Sidebar -->
<div class="sidebar">
    <h4 class="text-white text-center mb-4">Dashboard</h4>

    <a href="#" onclick="loadPage('dashboard'); return false;">🏠 Dashboard</a>
    <!-- Income Menu -->
    <a href="#" onclick="toggleMenu('incomeMenu')">💰 Income Management</a>
    <div id="incomeMenu" class="submenu">
        <a href="#" onclick="loadPage('addIncome')">➕ Add Income</a>
        <a href="#" onclick="loadPage('viewIncome')">📄 View Income</a>
      </div>

    <!-- Expense Menu -->
    <a href="#" onclick="toggleMenu('expenseMenu')">💸 Expense Management</a>
    <div id="expenseMenu" class="submenu">
        <a href="#" onclick="loadPage('addExpense')">➕ Add Expense</a>
        <a href="#" onclick="loadPage('viewExpense')">📄 View Expense</a>
     </div>

     <a href="#" onclick="toggleMenu('analysisMenu')">📊 Expense Analysis</a>
    <div id="analysisMenu" class="submenu">
        <a href="#" onclick="showExpenseAnalysis()">👁 View Analysis</a>
     </div>
    <a href="#" onclick="toggleMenu('riskMenu')">⚠️ Financial Risk</a>
    <div id="riskMenu" class="submenu">
       <a href="#" onclick="showRiskAnalysis()">👁 View Risk</a>
     </div>
    <!-- Logout -->
    <a href="#" onclick="logoutUser(); return false;">🚪 Logout</a>
</div>

<!-- 🔹 Main Content -->
<div class="content">

    <!-- Dynamic Content -->
    <div id="mainContent" class="mt-4"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

window.onload = function () {
    loadPage("dashboard");
};

function logoutUser() {

    let confirmLogout = confirm("Are you sure you want to logout?");

    if (!confirmLogout) {
        return; // ❌ cancel
    }

    fetch("/logout", {
        method: "GET"
    })
    .then(() => {
        // after logout redirect
        window.location.href = "/login";
    })
    .catch(err => {
        console.log(err);
        alert("Error logging out");
    });
}

function showExpenseAnalysis() {
    let content = document.getElementById("mainContent");

    fetch("/analysis")
    .then(res => res.json())
    .then(data => {

        let expenseLabels = Object.keys(data.category_expense_data);
        let expenseValues = Object.values(data.category_expense_data);

        content.innerHTML = `
            <h3 class="mb-4">📊 Expense Analysis</h3>

            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card shadow p-3 text-center">
                        <h5>🏦 Balance</h5>
                        <h2 class="text-primary">₹ ${data.balance}</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow p-3 text-center">
                        <h5>💰 Total Income</h5>
                        <h2 class="text-success">₹ ${data.total_income}</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow p-3 text-center">
                        <h5>💸 Total Expense</h5>
                        <h2 class="text-danger">₹ ${data.total_expense}</h2>
                    </div>
                </div>
            </div>

            <div class="row">

                <div class="col-md-6">
                    <div class="card p-3 shadow">
                        <h6 class="text-center">📊 Income vs Expense</h6>
                        <div class="chart-container">
                            <canvas id="compareChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card p-3 shadow">
                        <h6 class="text-center">🔴 Expense by Category</h6>
                        <div class="chart-container">
                            <canvas id="expenseChart"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        `;

        // ✅ SAFE DESTROY
        if (window.compareChart && typeof window.compareChart.destroy === "function") {
            window.compareChart.destroy();
        }

        if (window.expenseChart && typeof window.expenseChart.destroy === "function") {
            window.expenseChart.destroy();
        }

        // 🔥 CREATE CHARTS
        window.compareChart = new Chart(document.getElementById("compareChart"), {
            type: "bar",
            data: {
                labels: ["Income", "Expense"],
                datasets: [{
                    label: "Amount",
                    data: [data.total_income, data.total_expense],
                    backgroundColor: ["green", "red"]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        window.expenseChart = new Chart(document.getElementById("expenseChart"), {
            type: "line",
            data: {
                labels: expenseLabels,
                datasets: [{
                    label: "Expense",
                    data: expenseValues,
                    borderColor: "red",
                    backgroundColor: "rgba(255,0,0,0.1)",
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

    })
    .catch(err => {
        console.log(err);
        alert("Error loading analysis");
    });
}

function saveIncome() {
    let amount = document.getElementById("incomeAmount").value;
    let source = document.getElementById("incomeSource").value;
    let other = document.getElementById("otherSource").value;
    let date = document.getElementById("incomeDate").value;

    // 🔹 Handle "Other"
    if (source === "Other") {
        source = other;
    }

    // 🔹 Validation
    if (!amount || !source || !date) {
        alert("Please fill all fields");
        return;
    }

    if (amount <= 0) {
        alert("Amount must be greater than 0");
        return;
    }

    console.log("Sending data:", { amount, source, date }); // debug

    // 🔹 API Call
    fetch("/add-income", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            amount: amount,
            source: source,
            date: date
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || "Income added successfully");

        // 🔹 Reset form
        loadPage("addIncome");
    })
    .catch(err => {
        console.log(err);
        alert("Error saving income");
    });
}

function editIncome(id) {
    fetch("/get-income")
    .then(res => res.json())
    .then(data => {
        let item = data.find(i => i.id === id);

        let isCustom = !["Salary","Freelance","Business","Gift"].includes(item.source);

        let html = `
            <h4>Edit Income</h4>

            <!-- Amount -->
            <input type="number" step="0.01" id="editAmount" 
                class="form-control mb-2" value="${item.amount}">

            <!-- Source Dropdown -->
            <div class="position-relative mb-2">

                <select id="editSource" 
                    class="form-control" 
                    onchange="toggleEditOther()" 
                    style="appearance: none; padding-right: 30px;">

                    <option value="">Select Source</option>
                    <option value="Salary" ${item.source === "Salary" ? "selected" : ""}>💼Salary</option>
                    <option value="Freelance" ${item.source === "Freelance" ? "selected" : ""}>💻Freelance</option>
                    <option value="Business" ${item.source === "Business" ? "selected" : ""}>🏢Business</option>
                    <option value="Gift" ${item.source === "Gift" ? "selected" : ""}>🎁Gift</option>
                    <option value="Other" ${isCustom ? "selected" : ""}>➕Other</option>
                </select>

                
                <!-- 🔽 Dropdown Icon -->
                <span style="
                    position:absolute;
                    right:10px;
                    top:50%;
                    transform:translateY(-50%);
                    pointer-events:none;
                    font-size:14px;
                ">
                    ▼
                </span>

            </div>

            <!-- Other Source -->
            <input type="text" id="editOther" 
                class="form-control mb-2"
                placeholder="Enter other source"
                value="${isCustom ? item.source : ""}"
                style="display:${isCustom ? "block" : "none"};">

            <!-- Date -->
            <input type="date" id="editDate" 
                class="form-control mb-2" value="${item.date}">

            <button class="btn btn-success" onclick="updateIncome(${id})">Update</button>
        `;

        document.getElementById("mainContent").innerHTML = html;
    });
}


function editExpense(id) {
    fetch("/get-expense")
    .then(res => res.json())
    .then(data => {
        let item = data.find(i => i.id === id);

        let isCustom = !["Food","Groceries","Electricity","Internet","Rent","Petrol","Taxi","Bus","Shopping","Entertainment"].includes(item.category);

        let html = `
            <h4>Edit Expense</h4>

            <!-- Amount -->
            <input type="number" step="0.01" id="editExpense" 
                class="form-control mb-2" value="${item.amount}">

            <!-- Source Dropdown -->
            <div class="position-relative mb-2">

                <select id="editExpenseCategory" 
                    class="form-control" 
                    onchange="toggleEditUpdateOther()" 
                    style="appearance: none; padding-right: 30px;">

                    <option value="">Select Source</option>
                    <option value="Food" ${item.category === "Food" ? "selected" : ""}>🍔 Food</option>
                    <option value="Groceries" ${item.category === "Groceries" ? "selected" : ""}>🛒 Groceries</option>
                    <option value="Electricity" ${item.category === "Electricity" ? "selected" : ""}>💡 Electricity</option>
                    <option value="Internet" ${item.category === "Internet" ? "selected" : ""}>🌐 Internet</option>
                    <option value="Rent" ${item.category === "Rent" ? "selected" : ""}>🏠 Rent</option>
                    <option value="Petrol" ${item.category === "Petrol" ? "selected" : ""}>⛽ Petrol</option>
                    <option value="Taxi" ${item.category === "Taxi" ? "selected" : ""}>🚕 Taxi</option>
                    <option value="Bus" ${item.category === "Bus" ? "selected" : ""}>🚌 Bus</option>
                    <option value="Shopping" ${item.category === "Shopping" ? "selected" : ""}>🛍 Shopping</option>
                    <option value="Entertainment" ${item.category === "Entertainment" ? "selected" : ""}>🎬 Entertainment</option>
                    <option value="Other" ${isCustom ? "selected" : ""}>➕Other</option>
                   
                </select>

                
                <!-- 🔽 Dropdown Icon -->
                <span style="
                    position:absolute;
                    right:10px;
                    top:50%;
                    transform:translateY(-50%);
                    pointer-events:none;
                    font-size:14px;
                ">
                    ▼
                </span>

            </div>

            <!-- Other Source -->
            <input type="text" id="editExpenseOther" 
                class="form-control mb-2"
                placeholder="Enter category"
                value="${isCustom ? item.source : ""}"
                style="display:${isCustom ? "block" : "none"};">

            <!-- Date -->
            <input type="date" id="editExpenseDate" 
                class="form-control mb-2" value="${item.date}">

            <button class="btn btn-success" onclick="updateExpense(${id})">Update</button>
        `;

        document.getElementById("mainContent").innerHTML = html;
    });
}

function toggleEditOther() {
    let source = document.getElementById("editSource").value;
    let otherInput = document.getElementById("editOther");

    if (source === "Other") {
        otherInput.style.display = "block";
    } else {
        otherInput.style.display = "none";
        otherInput.value = ""; // optional (clears old value)
    }
}

function toggleEditUpdateOther() {
    let source = document.getElementById("editExpenseCategory").value;
    let otherInput = document.getElementById("editExpenseOther");

    if (source === "Other") {
        otherInput.style.display = "block";
    } else {
        otherInput.style.display = "none";
        otherInput.value = ""; // optional (clears old value)
    }
}

function deleteIncome(id) {

    // ✅ Popup confirmation
    let confirmDelete = confirm("Are you sure you want to delete this income?");

    if (!confirmDelete) {
        return; // ❌ user clicked Cancel
    }

    // ✅ Call backend API
    fetch("/delete-income/" + id, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || "Deleted successfully");

        // ✅ Refresh income list after delete
        loadPage("viewIncome");
    })
    .catch(err => {
        console.log(err);
        alert("Error deleting income");
    });
}

function deleteExpense(id) {

    // ✅ Popup confirmation
    let confirmDelete = confirm("Are you sure you want to delete this expense?");

    if (!confirmDelete) {
        return; // ❌ user clicked Cancel
    }

    // ✅ Call backend API
    fetch("/delete-expense/" + id, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || "Deleted successfully");

        // ✅ Refresh income list after delete
        loadPage("viewExpense");
    })
    .catch(err => {
        console.log(err);
        alert("Error deleting expense");
    });
}

function updateIncome(id) {
    let amount = document.getElementById("editAmount").value;
    let source = document.getElementById("editSource").value;
    let date = document.getElementById("editDate").value;
    let other = document.getElementById("editOther").value;

    if (source === "Other") {
        source = other;
    }
    fetch("/update-income/" + id, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            amount: amount,
            source: source,
            date: date
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadPage("viewIncome");
    });
}

function updateExpense(id) {
    let amount = document.getElementById("editExpense").value;

        })

    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadPage("viewExpense");
    });
}

// 🔹 Toggle submenu
function toggleMenu(menuId) {
    let menu = document.getElementById(menuId);
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function toggleOtherSource() {
    let source = document.getElementById("incomeSource").value;
    let otherInput = document.getElementById("otherSource");

    if (source === "Other") {
        otherInput.style.display = "block";
    } else {
        otherInput.style.display = "none";
    }
}



window.onload = function () {
    loadPage("dashboard"); // default open
};

// 🔹 Main Page Loader

        <!-- Date -->
        <input type="date" id="incomeDate"

                    <thead>

                            <th>Amount</th>

                            <th>Date</th>

// 🔹 Show "Other" field
function toggleExpenseOther() {
    let category = document.getElementById("expenseCategory").value;
    let other = document.getElementById("expenseOther");

    if (category === "Other") {
        other.classList.remove("d-none");
    } else {
        other.classList.add("d-none");
    }
}
function addExpense() {
    let amount = document.getElementById("expenseAmount").value;
    let category = document.getElementById("expenseCategory").value;
    let other = document.getElementById("expenseOther").value;
    let date = document.getElementById("expenseDate").value;
    if (category === "Other") {
        category = other;
    }

    // 🔹 Validation
    if (!amount || !category || !date) {
        alert("Please fill all fields");
        return;
    }

    if (amount <= 0) {
        alert("Amount must be greater than 0");
        return;
    }

    console.log("Sending data:", { amount, category, date }); // debug

    // 🔹 API Call
    fetch("/add-expense", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            amount: amount,
            category: category,
            date: date
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || "Expense added successfully");

        // 🔹 Reset form
        loadPage("addExpense");
    })
    .catch(err => {
        console.log(err);
        alert("Error add expense");
    });

// 💬 CHATBOT SCRIPT START

let userName = "";

setTimeout(() => {
    let btn = document.getElementById("chatBtn");

    if (btn) {
        btn.onclick = function () {
            let box = document.getElementById("chatBox");
            box.style.display = box.style.display === "none" ? "block" : "none";

            if (!userName) {
                botMessage("Hi 👋 What is your name?");
            }
        };
    }
}, 500);

function sendMessage() {
    let input = document.getElementById("chatInput");
    let msg = input.value.trim();

    if (!msg) return;

    addMessage("You", msg);
    input.value = "";

    setTimeout(() => handleBot(msg), 500);
}

function addMessage(sender, text) {
    let chat = document.getElementById("chatContent");
    chat.innerHTML += `<p><b>${sender}:</b> ${text}</p>`;
    chat.scrollTop = chat.scrollHeight;
}

function botMessage(text) {
    addMessage("Bot", text);
}

async function handleBot(msg) {
    msg = msg.toLowerCase();

    if (!userName) {
        userName = msg;
        botMessage(`Nice to meet you ${userName} 😊. What is your requirement?`);
        return;
    }

    let res = await fetch("/dashboard");
    let data = await res.json();

        // 🔥 RESPONSES

    if (msg.includes("total income")) {
        botMessage(`💰 Your total income is ₹ ${data.total_income}`);
    }

    else if (msg.includes("total expense")) {
        botMessage(`💸 Your total expense is ₹ ${data.total_expense}`);
    }

    else if (msg.includes("total saving") || msg.includes("balance")) {
        botMessage(`💼 Your total savings is ₹ ${data.balance}`);
    }
    else if (msg.includes("income")) {
        botMessage("👉 Go to Income Management → Add Income");
    }
    else if (msg.includes("expense")) {
        botMessage("👉 Go to Expense Management → Add Expense");
    }
    else if (msg.includes("analysis")) {
        botMessage("👉 Open Expense Analysis");
    }
    else if (msg.includes("risk")) {
        botMessage("👉 Open Financial Risk");
    }
    else {
        botMessage("⚠️ We are working on it and will provide better results soon.");
    }
}

// 💬 CHATBOT SCRIPT END
